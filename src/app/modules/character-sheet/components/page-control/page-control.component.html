<div class="d-flex flex-column page-control">
  <input type="file" #fileUpload style="display:none;"
         accept=".srg" (change)="onFileSelected($event)">

  <button class="btn btn-primary"
          [title]="'Upload Raw Character Data'"
          (click)="fileUpload.click()">
    <span class="mr-2">&#10514;</span>Upload Raw Character Data
  </button>
  <button class="btn btn-primary"
          [title]="'Download Raw Character Data'"
          (click)="downloadRawCharacterData()">
    <span class="mr-2">&#10515;</span>Download Raw Character Data
  </button>
</div>
